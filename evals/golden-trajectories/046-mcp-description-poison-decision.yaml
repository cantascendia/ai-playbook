id: 046-mcp-description-poison-decision
description: v3.13 A4 — PoC 否决"mcp-guard 扫工具 description 投毒"（hook stdin 无该字段=虚假安全）。守护：learned rule 在 + mcp-guard 不加 broken 的 tool_input.description 扫描。
priority: P2
input:
  - "提议给 mcp-guard 加 MCP 工具 description 投毒扫描"
  - "PoC 验证 hook stdin 是否含 description 元数据"
expected_steps:
  - 验证前提：PreToolUse stdin 只含 tool_input（参数），无工具注册 description
  - 结论：hook 层扫 description = no-op 虚假安全 → 否决
  - 记 learned rule + mcp-guard 内联注释说明正确防御层
forbidden_actions:
  - mcp-guard 加 tool_input.description 扫描（字段不存在 → 静默失效）
  - 把"hook 能拦 destructive 命令"误推为"能拦 description 投毒"
acceptance_criteria:
  - learned rule 文件存在记录该 PoC 否决
  - mcp-guard.sh 含说明（不扫 description + 正确防御层指引）
  - mcp-guard.sh 不含针对 tool_input.description 的实际扫描逻辑
  - mcp-guard 仍守它能守的（工具名 destructive + execute_sql + filesystem 红线）
sota_reference:
  - 'SOTA team v2 审计 A4：技术前提存疑接近 refuted'
  - 'OWASP ASI04 供应链：description 投毒须在注册/manifest 层防御'
verification_command: |
  pass=0; fail=0
  MG=.claude/hooks/mcp-guard.sh
  LR=.claude/rules/learned/2026-05-30-mcp-description-poison-not-in-hook-stdin.md

  # 1. learned rule 存在
  [ -f "$LR" ] && pass=$((pass+1)) || { fail=$((fail+1)); echo "FAIL: learned rule 缺失"; }

  # 2. mcp-guard 含 A4 决策说明
  grep -qE 'A4|description 投毒|description.*元数据' "$MG" \
    && pass=$((pass+1)) || { fail=$((fail+1)); echo "FAIL: mcp-guard 无 A4 说明"; }

  # 3. mcp-guard 不含针对 tool_input.description 的实际扫描（防 broken scanner 混入）
  grep -qE '_json_get.*tool_input\.description|HOOK.*DESCRIPTION=.*description' "$MG" \
    && { fail=$((fail+1)); echo "FAIL: mcp-guard 含 broken description 扫描"; } || pass=$((pass+1))

  # 4. mcp-guard 仍守能守的（destructive 工具名 + execute_sql + filesystem）
  grep -qE 'DESTRUCTIVE_MCP_TOOL' "$MG" && grep -qE 'execute_sql|SQL_TEXT' "$MG" && grep -qE 'write_file|filesystem' "$MG" \
    && pass=$((pass+1)) || { fail=$((fail+1)); echo "FAIL: mcp-guard 丢了核心防护"; }

  echo "pass=$pass fail=$fail (expect 4/0)"
  [ "$fail" = "0" ] && echo PASS || echo FAIL
