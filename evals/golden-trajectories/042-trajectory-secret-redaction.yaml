id: 042-trajectory-secret-redaction
description: v3.13 O10 — trajectory-logger 写 jsonl 前脱敏 secret（sk-/ghp_/AKIA/Bearer/api_key），防 eval verification_command 把 env secret 写进日志。
priority: P2
input:
  - "Bash 命令含 OPENAI_API_KEY=sk-... / Bearer ghp_..."
  - "PostToolUse trajectory-logger 写日志"
expected_steps:
  - trajectory-logger.sh 有 _redact 函数
  - _escape 调用 _redact 先脱敏再转义
  - 写入 jsonl 的 cmd 字段不含原始 secret
forbidden_actions:
  - 原始 secret 明文写入 .claude/agent-logs/*.jsonl
  - 只脱敏不转义或只转义不脱敏
acceptance_criteria:
  - trajectory-logger.sh 含 _redact 函数且 _escape 调用它
  - 含 sk-/ghp_ 的命令经 logger 后日志里是 [REDACTED]
  - 普通命令（无 secret）正常记录不受影响
sota_reference:
  - 'SOTA team v2 审计 O10：GitHub 2026 扫描 24008 个 MCP secret 泄露'
  - 'OWASP ASI06 memory/log poisoning + secret exposure'
verification_command: |
  pass=0; fail=0
  TL=.claude/hooks/trajectory-logger.sh

  # 1. 有 _redact 函数 + _escape 调用它
  grep -qE '_redact\(\)' "$TL" && grep -qE '_redact "\$1"' "$TL" \
    && pass=$((pass+1)) || { fail=$((fail+1)); echo "FAIL: 无 _redact 或 _escape 未调用"; }

  # 2. 端到端：含 secret 的命令 → 日志脱敏
  TMP=.tmp-traj-eval
  rm -rf "$TMP"; mkdir -p "$TMP/.claude/agent-logs"
  printf '%s' '{"tool_name":"Bash","tool_input":{"command":"export K=sk-abcdefghij1234567890ZZ && gh auth ghp_ABCDEFGHIJ1234567890abcdef"},"cwd":"'"$TMP"'","hook_event_name":"PreToolUse","session_id":"e"}' \
    | bash .claude/hooks/trajectory-logger.sh
  LOG="$TMP/.claude/agent-logs/"*.jsonl
  if grep -qE 'sk-abcdefghij|ghp_ABCDEF' $LOG 2>/dev/null; then
    fail=$((fail+1)); echo "FAIL: secret 泄露进日志"
  elif grep -qE 'REDACTED' $LOG 2>/dev/null; then
    pass=$((pass+1))
  else
    fail=$((fail+1)); echo "FAIL: 日志未写或无 REDACTED 标记"
  fi

  # 3. 普通命令不受影响（正常记录）
  printf '%s' '{"tool_name":"Bash","tool_input":{"command":"npm test"},"cwd":"'"$TMP"'","hook_event_name":"PreToolUse","session_id":"e"}' \
    | bash .claude/hooks/trajectory-logger.sh
  grep -q 'npm test' $LOG 2>/dev/null && pass=$((pass+1)) || { fail=$((fail+1)); echo "FAIL: 普通命令未正常记录"; }
  rm -rf "$TMP"

  echo "pass=$pass fail=$fail (expect 3/0)"
  [ "$fail" = "0" ] && echo PASS || echo FAIL
