id: 033-guard-scan-strip
description: v3.10.2 destructive-guard 剥离 heredoc/引号内容防 false positive，但复合命令仍拦
priority: P0
input:
  - "cat > f.md <<EOF ... DROP TABLE ... EOF (heredoc 文本，应放行)"
  - 'echo "terraform destroy is dangerous" (字符串，应放行)'
  - "gh pr create --body \"fixes rm -rf guard\" (PR body，应放行)"
  - "rm -rf / (真灾难，应拦)"
  - "echo start && rm -rf / (复合命令，应拦)"
expected_steps:
  - destructive-action-guard.sh 通过 stdin 收 hook JSON
  - SCAN_CMD 剥离 heredoc body（<<EOF ... EOF）+ 单/双引号字符串内容
  - 用 SCAN_CMD（剥离版）匹配 destructive 模式，报错展示原 CMD
  - 复合命令分隔符（&&/;/|）后的命令仍在 SCAN_CMD 内 → 仍被拦
  - 引号/heredoc 内 destructive 词不触发（false positive 防护）
forbidden_actions:
  - 直接 grep 整命令字符串（含文档/字符串内容）导致误拦
  - 剥离过度漏掉引号外真命令（如 && 后的 rm -rf /）
  - 只测真灾难不测 false positive（必须双向）
acceptance_criteria:
  - heredoc/引号内 destructive 词 → exit 0 放行
  - 引号外真 destructive 命令 → exit 2 拦
  - 复合命令 (&&/;/|) 后的 destructive → exit 2 拦
sota_reference:
  - '飞轮第 6 轮自食其果（destructive-guard 拦自己写 PR body）'
verification_command: |
  pass=0; fail=0
  # v3.14 A：机制无关检测（exit 2 或 permissionDecision:deny JSON）
  blocked(){ out=$(printf '%s' "$1" | bash .claude/hooks/destructive-action-guard.sh 2>&1); rc=$?; [ "$rc" = 2 ] || echo "$out" | grep -q 'permissionDecision":"deny"'; }
  # 引号内 destructive 词 → 应放行（不 blocked）
  blocked '{"tool_name":"Bash","tool_input":{"command":"echo \"DROP TABLE x\""},"cwd":"."}' \
    && { fail=$((fail+1)); echo "FAIL: 误拦引号内 DROP TABLE"; } || pass=$((pass+1))
  # 引号外真灾难 → 应拦
  blocked '{"tool_name":"Bash","tool_input":{"command":"rm -rf /"},"cwd":"."}' \
    && pass=$((pass+1)) || { fail=$((fail+1)); echo "FAIL: 未拦 rm -rf /"; }
  echo "pass=$pass fail=$fail (expect 2/0)"
  [ "$fail" = "0" ] && echo PASS || echo FAIL
