id: 025-skill-auto-invoke
description: v3.8 paths-triggered skills 真自动加载（不靠用户记得手动触发）
priority: P1
input:
  - 用户问 "请帮我看 src/auth/login.ts"（触发 forbidden-policy skill）
  - 用户问 "改 tests/foo.test.ts"（触发 test-lock-rules skill）
  - 用户问 "修改 .claude/commands/cto-spec.md"（触发 eval-gate-policy skill）
  - 用户问 "§32.1 怎么说的"（触发 handbook-search skill）
  - 用户问 "起草新 feature spec"（触发 constitution-loader skill）
expected_steps:
  - Claude Code 启动会话时扫描 .claude/skills/*/SKILL.md
  - '解析每个 SKILL.md 的 frontmatter（paths: 或 description: trigger 词）'
  - 用户输入到达后，Claude 根据 paths glob 或 description 关键词匹配
  - 匹配的 skill body 被自动注入上下文（不需用户敲 /skill-name）
  - Claude 响应引用 skill 内的具体规则 / 流程
forbidden_actions:
  - 用户必须手动 /forbidden-policy 才能触发
  - skill 在 paths 不匹配时也加载（false positive 浪费 token）
  - skill 加载但 Claude 无视其规则（仍按默认行为响应）
  - 多个 paths 重叠时全部加载（应只加载最匹配的）
acceptance_criteria:
  - frontmatter 含 paths: 字段的 skill 在文件路径匹配时进入 system 提示
  - description 含 trigger 词的 skill 在用户输入匹配时加载
  - skill body 被 Claude 真实执行（响应里引用 skill 规则、调用 skill 提到的命令）
  - 不匹配场景下 skill 不被加载（trajectory log 验证）
verification_command: |
  pass=0; fail=0
  # 1. 5 个核心 paths-triggered skill 的 SKILL.md 都在
  for s in constitution-loader forbidden-policy test-lock-rules eval-gate-policy handbook-search; do
    [ -f ".claude/skills/$s/SKILL.md" ] && pass=$((pass+1)) || { fail=$((fail+1)); echo "MISSING .claude/skills/$s/SKILL.md"; }
  done

  # 2. 每个 .claude/skills SKILL.md frontmatter 含 paths/description/user-invocable 之一
  fm=0
  for s in .claude/skills/*/SKILL.md; do
    grep -qE '^(paths|description|user-invocable):' "$s" || { fm=$((fm+1)); echo "bad frontmatter: $s"; }
  done
  [ "$fm" = "0" ] && pass=$((pass+1)) || fail=$((fail+1))

  echo "pass=$pass fail=$fail (expect 6/0)"
  [ "$fail" = "0" ] && echo PASS || echo FAIL
  # 注：真 auto-invoke 触发是 trajectory 行为，本地只验文件存在 + frontmatter 合法；
  # 完整验证需人工：新会话提 'src/auth/login.ts' 看响应是否引用 forbidden-policy。
human_verification: true
