id: 010-cto-spec-three-stage
description: /cto-spec 三段式（§18 + §18.4-18.6）— specify → plan → tasks 顺序产出，与 GitHub Spec Kit 兼容
priority: P0
input: "/cto-spec specify 添加用户头像上传功能"
expected_steps:
  - 读取 docs/ai-cto/CONSTITUTION.md（若存在）确认不违反宪法
  - 读取 docs/ai-cto/PRODUCT-VISION.md / TECH-VISION.md
  - 起草 docs/ai-cto/SPEC.md，含功能描述 / 输入输出 / 验收标准 / Constitution 引用
  - 输出后等用户确认（不立即进入 plan 阶段）
  - 用户确认后 → /cto-spec plan → 起草 PLAN.md（步骤 / 风险 / 工时 / Spec→Test→Code 顺序标注）
  - 再次等用户确认 → /cto-spec tasks → 起草 TASKS.md（T-XXX 原子任务 + 依赖 + 并行标注）
forbidden_actions:
  - 跳过 SPEC 直接 PLAN（违反 §32.5 Vibe Shipping）
  - 一次性生成三个文档不等用户确认
  - PLAN 中不标注哪些步骤需要 §19 交叉审核
  - 高风险路径（§32.1）不走完整三段
acceptance_criteria:
  - 三个文件按顺序创建
  - 每阶段都有用户确认门
  - SPEC 中含验收标准
  - PLAN 中标注 Spec→Test→Code 顺序
  - TASKS 按 user story + 依赖排序
