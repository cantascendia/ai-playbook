name: Eval Gate (铁律 #12)

# 修改 commands / agents / skills / CLAUDE.md / handbook / 计数 SSOT 时跑全量 eval
on:
  pull_request:
    paths:
      - '.claude/commands/**'
      - '.claude/agents/**'
      - '.claude/skills/**'
      - '.agents/skills/**'
      - 'CLAUDE.md'
      - 'playbook/handbook.md'
      - 'evals/**'
      - 'scripts/run-evals.sh'
      - 'scripts/check-counts.sh'
      - 'docs/ai-cto/COUNTS.md'
      - '.claude/hooks/**'
  # v4.1 (SPEC-001 item 3): 闭合 push-不走-PR 缺口 —— 直接 push 到 main 也跑 eval gate。
  # 事后信号（push 已发生）；真正阻断靠 GitHub branch protection（require PR + require this
  # check），属仓库治理开关（改变人的 direct-push 权限）—— 见 SPEC-001 tasks 人工步。
  push:
    branches: [main]
    paths:
      - '.claude/commands/**'
      - '.claude/agents/**'
      - '.claude/skills/**'
      - '.agents/skills/**'
      - 'CLAUDE.md'
      - 'playbook/handbook.md'
      - 'evals/**'
      - 'scripts/run-evals.sh'
      - 'scripts/check-counts.sh'
      - 'docs/ai-cto/COUNTS.md'
      - '.claude/hooks/**'
  workflow_dispatch:

jobs:
  eval-gate:
    name: Run evals (v3.12 真执行)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # v4.0e: 显式声明 Node（v4.0b guard engine = engine/*.mjs，run-evals.sh 经 shim exec node）。
      # ubuntu-latest 预装 node，但显式 setup 避免 base image 变更时静默破门（cutover 审查 MUST）。
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Count eval cases
        id: count
        run: |
          N=$(ls evals/golden-trajectories/*.yaml 2>/dev/null | wc -l)
          echo "count=$N" >> $GITHUB_OUTPUT
          echo "Found $N golden trajectories"

      # v3.13 SSOT gate（SOTA team 审计 R1）：COUNTS.md 自称唯一计数源但一直无 enforcer
      # → 计数漂移（hooks 写 9 实 10）。check-counts.sh 比对 COUNTS vs 文件系统，不符 exit 1。
      # 同时硬查 5 个安全红线 guard 存在（防 cto-init 安装链断裂复发）。
      - name: Check counts SSOT (R1)
        run: |
          chmod +x scripts/check-counts.sh
          bash scripts/check-counts.sh

      # v3.12 核心 gate（飞轮第 7-8 轮 team 修「铁律 #12 eval 空壳」）：
      # 旧 CI 只 count yaml + assert 字段存在 = §32.5 反模式 #6 eval-gaming。
      # 现在真跑每个 verification_command（hook 红线 / guard 行为），FAIL → exit 1 阻 merge。
      # AlphaEvolve evaluator-grounded：eval 必须真执行才是 fitness 函数。
      # v4.0e: guard engine 单测（node:test）纳入 gate — 引擎红线逻辑回归防护。
      - name: Run guard engine unit tests
        run: |
          if [ -f .claude/hooks/engine/guard.test.mjs ]; then
            node --test .claude/hooks/engine/guard.test.mjs
          else
            echo "no engine unit suite — skipped"
          fi

      # 诊断（非阻断）：drill 演练在 ubuntu 的完整输出 —— 定位跨平台失败。
      - name: Drill diagnostics (non-blocking)
        run: |
          echo "=== jq/node present? ==="; command -v jq; command -v node; jq --version || true
          echo "=== drill runner verbose ==="
          DRILL_VERBOSE=1 bash evals/drills/run.sh || true
          echo "=== eval 075 verbose ==="
          EVAL_VERBOSE=1 bash scripts/run-evals.sh 075 || true

      - name: Run executable evals (real execution)
        run: |
          chmod +x scripts/run-evals.sh
          bash scripts/run-evals.sh

      - name: Validate yaml structure
        run: |
          python3 - <<'PY'
          import yaml, glob, sys
          bad = 0
          for f in sorted(glob.glob('evals/golden-trajectories/*.yaml')):
              try:
                  d = yaml.safe_load(open(f, encoding='utf-8'))
                  for k in ('id','description','expected_steps','forbidden_actions','acceptance_criteria'):
                      assert k in d, f"{f} missing {k}"
              except Exception as e:
                  print(f"STRUCTURE FAIL: {e}")
                  bad += 1
          if bad:
              sys.exit(1)
          print("✅ all yaml structure + required fields OK")
          PY

      - name: Skill manifest consistency
        run: |
          python3 - <<'PY'
          import json, os, sys
          mf = '.agents/skills-manifest.json'
          if os.path.exists(mf):
              m = json.load(open(mf, encoding='utf-8'))
              missing = [s['skillId'] for s in m.get('skills', []) if not os.path.exists(s['location'])]
              if missing:
                  print("MISSING physical file:", missing)
                  sys.exit(1)
              print("✅ skill manifest OK")
          else:
              print("no manifest — skipped")
          PY

      - name: Frontmatter completeness
        run: |
          MISSING=0
          for f in .claude/commands/cto-*.md; do
            head -1 "$f" | grep -q '^---$' || { echo "$f missing frontmatter"; MISSING=$((MISSING+1)); }
          done
          [ $MISSING -eq 0 ] || (echo "✗ $MISSING commands without frontmatter" && exit 1)

      - name: Summary
        run: |
          echo "✅ Eval gate passed (${{ steps.count.outputs.count }} trajectories: counts-SSOT + engine-unit + real-exec + structure)"
