name: Codex Cross-Model Review (§48 兜底)

# ⚠️ 安全警告：切勿改为 pull_request_target
# pull_request_target 会在 base repo 权限下跑（含 secrets），
# fork PR 作者能利用此攻击向量泄露 OPENAI_API_KEY。
# 当前用 pull_request 在 fork 副本上跑，secrets 不可访问 — 安全。
# 详见：https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**'
      - 'app/**'
      - 'lib/**'
      - 'apps/**'
      - 'packages/**'
      - '!**/*.md'
      - '!docs/**'

jobs:
  codex-review:
    name: GPT-5.5 Code Review
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-codex-review')
    # FIX: secret 必须在 job-level env 暴露，否则 step 的 if 表达式看不到
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Forbidden path check
        id: forbidden
        run: |
          FORBIDDEN=$(git diff --name-only origin/main HEAD | \
            grep -cE '(auth|payment|secrets|migration|crypto|infra)/' || true)
          [ -z "$FORBIDDEN" ] && FORBIDDEN=0
          echo "count=$FORBIDDEN" >> $GITHUB_OUTPUT

      - name: Detect API key availability
        id: key
        run: |
          if [ -n "$OPENAI_API_KEY" ] || [ "${{ vars.CODEX_REVIEW_ENABLED }}" = "true" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment skip if forbidden
        if: steps.forbidden.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🛑 **Codex Review Skipped** — PR 触及 §32.1 forbidden 路径（auth/payment/secrets/migration/crypto/infra）。\n\nCodex review 会上传代码到 OpenAI，敏感路径必须**人工 review**。\n\n如确认已脱敏可加 `skip-codex-review` 标签或 force push 后人工触发 `/cto-cross-review --force`。'
            });

      - name: Run Codex review
        if: |
          steps.forbidden.outputs.count == '0' &&
          steps.key.outputs.available == 'true'
        run: |
          echo "Run codex review (placeholder — actual integration needs openai/codex-action@v1)"
          # 真实集成时使用：
          # uses: openai/codex-action@v1
          # with:
          #   command: review
          #   diff_base: origin/main
          #   spec_file: docs/ai-cto/SPEC.md
          #   constitution_file: docs/ai-cto/CONSTITUTION.md
          #   eval_dimensions: "architecture,quality,perf,security,test,dx,functional,ux"

      - name: Skip notice
        if: steps.key.outputs.available == 'false'
        run: |
          echo "OPENAI_API_KEY secret 未配置；跳过 Codex review。"
          echo "本地若已 codex login，Stop hook 会通过 codex-bridge skill 处理。"
